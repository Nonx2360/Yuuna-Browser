<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Yuuna-chan</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-title">Yuuna-chan ✨</div>
    <div class="header-right">
      <span class="agent-badge">Agent Mode</span>
      <label class="toggle-container">
        <span class="toggle-label">Thoughts</span>
        <label class="switch">
          <input type="checkbox" id="toggleThoughts">
          <span class="slider"></span>
        </label>
      </label>
    </div>
  </div>

  <div class="chat-container" id="chat">
    <div class="message yuuna">Hey! I'm here~ What do you need today? You can ask me anything, or say <strong>agent:</strong> to let me browse for you! 🌸</div>
  </div>

  <div class="hint">Type <code>agent: your task</code> to start an agentic workflow</div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Chat or 'agent: find me...'" autofocus>
    <button id="sendBtn">Send</button>
    <div class="loader" id="loader"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
